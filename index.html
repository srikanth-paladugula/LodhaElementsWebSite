<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Lodha Elements | Premium Interior & Exterior Design in India</title>
    <meta name="title" content="Lodha Elements | Premium Interior & Exterior Design in India" />
    <meta name="description" content="Lodha Elements is a premium interior and exterior design studio in India with 12+ years of excellence and 150+ projects completed. Residential, commercial, and renovation design services." />
    <meta name="keywords" content="interior design, exterior design, premium interiors, luxury home design, residential design India, commercial interior design, renovation, Lodha Elements" />
    <meta name="author" content="Lodha Elements" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lodhaelements.in/" />

    <!-- Theme & Favicon -->
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lodhaelements.in/" />
    <meta property="og:title" content="Lodha Elements | Premium Interior & Exterior Design" />
    <meta property="og:description" content="We design living environments of rare beauty and quiet luxury — where every element is chosen with intention. 150+ projects completed across India." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1200&auto=format&fit=crop&q=80" />
    <meta property="og:site_name" content="Lodha Elements" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://lodhaelements.in/" />
    <meta name="twitter:title" content="Lodha Elements | Premium Interior & Exterior Design" />
    <meta name="twitter:description" content="We design living environments of rare beauty and quiet luxury — where every element is chosen with intention." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1200&auto=format&fit=crop&q=80" />

    <!-- Structured Data: Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "InteriorDesignBusiness",
      "name": "Lodha Elements",
      "description": "Premium interior and exterior design studio crafting extraordinary living spaces across India.",
      "url": "https://lodhaelements.in",
      "logo": "https://lodhaelements.in/favicon.svg",
      "image": "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1200&auto=format&fit=crop&q=80",
      "email": "hello@lodhaelements.com",
      "foundingDate": "2014",
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "minValue": 10,
        "maxValue": 50
      },
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Design Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": { "@type": "Service", "name": "Residential Design" }
          },
          {
            "@type": "Offer",
            "itemOffered": { "@type": "Service", "name": "Commercial Spaces" }
          },
          {
            "@type": "Offer",
            "itemOffered": { "@type": "Service", "name": "Renovation & Styling" }
          }
        ]
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "150"
      },
      "sameAs": [
        "https://instagram.com",
        "https://pinterest.com",
        "https://linkedin.com"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
